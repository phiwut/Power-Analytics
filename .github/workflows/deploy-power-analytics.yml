name: Deploy Power Analytics

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-power-analytics.yml"
      - "artifacts/power-analytics/**"
      - "lib/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-power-analytics-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build Power Analytics
        run: pnpm --filter @workspace/power-analytics run build

      - name: Deploy Worker
        working-directory: artifacts/power-analytics
        run: pnpm exec wrangler deploy
